<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bark — Seller List Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    navy:'#111637', dnavy:'#1d234f', brand:'#2d7af1', slate:'#6c7191',
    violet:'#6b47d9', gold:'#f59e0b', lav:'#eef0fc'
  }, fontFamily: { sans:['Inter','system-ui','sans-serif'] } } }
}
</script>
<style>
  body{font-family:Inter,system-ui,sans-serif;background:#f4f5f7}
  .noscroll::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

/* ---------- mock data ---------- */
const GOALS = ['Weight loss','Injury rehabilitation','Firming & toning','Muscle strength','Cardio & endurance','Pre / post natal'];
const TRAINERS = [
  { id:1, name:'Kayle Fitness', verified:true, state:'reviewed', rating:5.0, reviews:46, topMatch:true,
    location:'Sydney NSW', distance:0.6, hires:32, years:16, responseMins:6, priceVal:75, price:'$75/week',
    goals:['Weight loss','Injury rehabilitation','Firming & toning'], gender:'Male', avail:'In-person',
    bio:'Weight-loss and strength coach in Sydney. One-to-one or small group, in-studio or at your home. Beginners always welcome.',
    why:['Specialises in weight loss','8 reviews mention injury rehab','0.6 km from you','Usually replies within 6 minutes'],
    color:'#2d7af1', initials:'KF' },
  { id:2, name:'Peak Performance Coaching', verified:true, state:'reviewed', rating:5.0, reviews:47, topMatch:true,
    location:'Sydney NSW', distance:1.2, hires:41, years:15, responseMins:22, priceVal:90, price:'$90/week',
    goals:['Injury rehabilitation','Muscle strength','Weight loss'], gender:'Male', avail:'In-person',
    bio:'15 years coaching athletes and everyday clients across Sydney. I focus on injury rehab and keeping you training consistently.',
    why:['15 years of coaching experience','Injury rehab is a core service','Top-rated across 47 reviews'],
    color:'#e11d48', initials:'PP' },
  { id:3, name:'Sarah Bennett PT', verified:true, state:'no-reviews', rating:null, reviews:0, topMatch:true,
    location:'Sydney NSW', distance:2.1, hires:4, years:6, responseMins:35, priceVal:60, price:'$60/session',
    goals:['Pre / post natal','Weight loss','Firming & toning'], gender:'Female', avail:'In-person',
    bio:'Pre and post-natal specialist offering friendly, no-judgement sessions. Every plan is built around your week and your goals.',
    why:['Pre & post-natal specialist','2.1 km from you','New to Bark, 6 years in the industry'],
    color:'#7c3aed', initials:'SB' },
  { id:4, name:'Marcus Lee Training', verified:true, state:'no-reviews', rating:null, reviews:0, topMatch:false,
    location:'Sydney NSW', distance:3.4, hires:4, years:9, responseMins:120, priceVal:55, price:'$55/session',
    goals:['Cardio & endurance','Weight loss','Firming & toning'], gender:'Male', avail:'In-person',
    bio:'Boxing and HIIT for fat loss and confidence. High-energy sessions morning and evening across the CBD, all levels welcome.',
    why:['Boxing & HIIT focus for fat loss','Sessions morning and evening','9 years in the industry'],
    color:'#0891b2', initials:'ML' },
  { id:5, name:'Iron Path Fitness', verified:true, state:'new', rating:null, reviews:0, topMatch:true,
    location:'Sydney NSW', distance:1.9, hires:0, years:16, responseMins:6, priceVal:110, price:'$110/week',
    goals:['Muscle strength','Weight loss','Firming & toning'], gender:'Male', avail:'In-person',
    bio:'Strength and conditioning for busy professionals. Structured programming and check-ins so every single session counts.',
    why:['Strength & conditioning specialist','Fast to respond (6 min)','New on Bark'],
    color:'#334155', initials:'IP' },
  { id:6, name:'Coastline Coaching', verified:true, state:'reviewed', rating:4.8, reviews:31, topMatch:false,
    location:'Bondi NSW', distance:4.6, hires:18, years:8, responseMins:45, priceVal:45, price:'$45/session',
    goals:['Cardio & endurance','Injury rehabilitation'], gender:'Female', avail:'In-person',
    bio:'Outdoor and beach sessions across the Eastern Suburbs. Focus on mobility, movement quality and long-term consistency.',
    why:['Mobility and movement focus','4.8 across 31 reviews','Outdoor sessions'],
    color:'#059669', initials:'CC' },
  { id:7, name:'James Okoro PT', verified:true, state:'reviewed', rating:4.6, reviews:22, topMatch:false,
    location:'Newtown NSW', distance:5.2, hires:15, years:11, responseMins:90, priceVal:50, price:'$50/session',
    goals:['Injury rehabilitation','Muscle strength'], gender:'Male', avail:'In-person',
    bio:'Ex-rugby S&C coach. Rebuild strength after injury and learn to move pain-free, at a pace that genuinely suits you.',
    why:['Ex-rugby strength coach','Injury rehab specialist','4.6 across 22 reviews'],
    color:'#b45309', initials:'JO' },
  { id:8, name:'Elevate Studio', verified:true, state:'reviewed', rating:4.9, reviews:64, topMatch:true,
    location:'Surry Hills NSW', distance:1.4, hires:52, years:7, responseMins:12, priceVal:120, price:'$120/week',
    goals:['Firming & toning','Weight loss','Muscle strength'], gender:'Female', avail:'Online only',
    bio:'Boutique studio with personalised programming and nutrition guidance. Small groups and one-to-one, online or in person.',
    why:['4.9 across 64 reviews','Nutrition guidance included','1.4 km from you'],
    color:'#db2777', initials:'ES' },
];

/* ---------- icons ---------- */
const Ic = ({d, cls='w-4 h-4'}) => <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const paths = {
  pin:'M12 21s-7-5.2-7-11a7 7 0 1114 0c0 5.8-7 11-7 11z M12 10a2 2 0 100-4 2 2 0 000 4z',
  users:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8z',
  case:'M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2',
  clock:'M12 22a10 10 0 100-20 10 10 0 000 20z M12 6v6l4 2',
  x:'M18 6L6 18 M6 6l12 12',
  chevron:'M6 9l6 6 6-6',
  check:'M20 6L9 17l-5-5',
  spark:'M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z',
  msg:'M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z',
  dollar:'M12 1v22 M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6'
};
const Star = ({filled}) => <svg className="w-4 h-4" viewBox="0 0 24 24" fill={filled?'#f59e0b':'none'} stroke="#f59e0b" strokeWidth="1.5"><path d="M12 2l3 6.5L22 9l-5 4.5L18.5 21 12 17.3 5.5 21 7 13.5 2 9l7-.5z"/></svg>;

/* ---------- filter config ---------- */
const PRICE = [{k:'u30',l:'Under $30',t:t=>t.priceVal<30},{k:'30-60',l:'$30–60',t:t=>t.priceVal>=30&&t.priceVal<=60},{k:'60-100',l:'$60–100',t:t=>t.priceVal>60&&t.priceVal<=100},{k:'100',l:'$100+',t:t=>t.priceVal>100}];
const RATING = [{k:'any',l:'Any',v:0},{k:'4',l:'4+',v:4},{k:'4.5',l:'4.5+',v:4.5}];
const RESP = [{k:'any',l:'Any',v:99999},{k:'1h',l:'Within 1 hour',v:60},{k:'1d',l:'Within 1 day',v:1440}];
const DIST = [{k:'5',l:'5 km',v:5},{k:'10',l:'10 km',v:10},{k:'25',l:'25 km',v:25},{k:'50',l:'50 km',v:50}];

function App(){
  const [banner,setBanner] = useState(true);
  const [price,setPrice] = useState(null);
  const [rating,setRating] = useState('any');
  const [resp,setResp] = useState('any');
  const [dist,setDist] = useState(null);
  const [goals,setGoals] = useState([]);
  const [expanded,setExpanded] = useState({});
  const [seeMore,setSeeMore] = useState({});

  const toggleGoal = g => setGoals(gs => gs.includes(g)? gs.filter(x=>x!==g): [...gs,g]);
  const clearAll = () => { setPrice(null);setRating('any');setResp('any');setDist(null);setGoals([]); };

  const results = useMemo(()=> TRAINERS.filter(t=>{
    if(price){ const p=PRICE.find(x=>x.k===price); if(p && !p.t(t)) return false; }
    if(rating!=='any'){ const v=RATING.find(x=>x.k===rating).v; if(!t.rating || t.rating<v) return false; }
    if(resp!=='any'){ const v=RESP.find(x=>x.k===resp).v; if(t.responseMins>v) return false; }
    if(dist){ const v=DIST.find(x=>x.k===dist).v; if(t.distance>v) return false; }
    if(goals.length){ if(!goals.some(g=>t.goals.includes(g))) return false; }
    return true;
  }), [price,rating,resp,dist,goals]);

  const chips = [];
  if(price) chips.push({id:'price',l:PRICE.find(x=>x.k===price).l,clr:()=>setPrice(null)});
  if(rating!=='any') chips.push({id:'rating',l:RATING.find(x=>x.k===rating).l+' rating',clr:()=>setRating('any')});
  if(resp!=='any') chips.push({id:'resp',l:RESP.find(x=>x.k===resp).l,clr:()=>setResp('any')});
  if(dist) chips.push({id:'dist',l:'Within '+DIST.find(x=>x.k===dist).l,clr:()=>setDist(null)});
  goals.forEach(g=>chips.push({id:'g'+g,l:g,clr:()=>toggleGoal(g)}));

  const Pill = ({active,onClick,children}) => (
    <button onClick={onClick} className={"px-3.5 py-1.5 rounded-full text-sm border transition "+(active?'border-brand bg-brand/10 text-brand font-medium':'border-slate-200 bg-white text-navy hover:border-slate-300')}>{children}</button>
  );
  const Section = ({title,value,children}) => (
    <div className="border-b border-slate-100 py-4">
      <div className="flex items-center justify-between mb-3">
        <span className="font-semibold text-navy text-[15px]">{title}</span>
        {value && <span className="text-brand text-sm font-medium">{value}</span>}
      </div>
      {children}
    </div>
  );

  return (
    <div className="min-h-screen">
      {/* hero */}
      <div className="bg-white border-b border-slate-100">
        <div className="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
          <span className="text-2xl font-bold text-navy tracking-tight">bark</span>
          <span className="text-sm text-slate">Log in</span>
        </div>
      </div>
      <div className="bg-slate-400/90" style={{background:'linear-gradient(#8891a8,#8891a8)'}}>
        <div className="max-w-6xl mx-auto px-5 py-8 text-center">
          <h1 className="text-2xl font-bold text-white mb-4">Find top-rated Personal Trainers near you</h1>
          <div className="flex gap-2 max-w-2xl mx-auto">
            <div className="flex-1 bg-white rounded-lg px-3 py-2.5 text-left text-navy text-sm flex items-center gap-2"><span className="text-slate">🔍</span>Personal Trainers</div>
            <div className="flex-1 bg-white rounded-lg px-3 py-2.5 text-left text-navy text-sm flex items-center gap-2"><span className="text-slate">📍</span>Sydney, NSW</div>
            <button className="bg-brand text-white rounded-lg px-4">Search</button>
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 py-6 flex gap-6 items-start">
        {/* sidebar */}
        <aside className="w-[300px] shrink-0 bg-white rounded-2xl border border-slate-100 px-5 pb-4 sticky top-4">
          <div className="flex items-center justify-between pt-4 pb-1">
            <span className="text-[13px] font-bold tracking-wider text-slate">FILTERS</span>
            <button onClick={clearAll} className="text-brand text-sm font-medium">Clear all</button>
          </div>
          <Section title="Price" value={price?PRICE.find(x=>x.k===price).l:'Any'}>
            <div className="flex flex-wrap gap-2">{PRICE.map(p=><Pill key={p.k} active={price===p.k} onClick={()=>setPrice(price===p.k?null:p.k)}>{p.l}</Pill>)}</div>
          </Section>
          <Section title="Rating" value={rating!=='any'?RATING.find(x=>x.k===rating).l:'Any'}>
            <div className="flex flex-wrap gap-2">{RATING.map(r=><Pill key={r.k} active={rating===r.k} onClick={()=>setRating(r.k)}>{r.l}</Pill>)}</div>
          </Section>
          <Section title="Response time" value={resp!=='any'?RESP.find(x=>x.k===resp).l:'Any'}>
            <div className="flex flex-wrap gap-2">{RESP.map(r=><Pill key={r.k} active={resp===r.k} onClick={()=>setResp(r.k)}>{r.l}</Pill>)}</div>
          </Section>
          <Section title="Distance" value={dist?DIST.find(x=>x.k===dist).l:'Any'}>
            <div className="flex flex-wrap gap-2">{DIST.map(d=><Pill key={d.k} active={dist===d.k} onClick={()=>setDist(dist===d.k?null:d.k)}>{d.l}</Pill>)}</div>
          </Section>
          <div className="pt-4">
            <div className="text-[12px] font-bold tracking-wider text-slate mb-3">PERSONAL TRAINER FILTERS</div>
            <div className="font-semibold text-navy text-[15px] mb-2">Training goals</div>
            <div className="space-y-1.5">
              {GOALS.map(g=>(
                <label key={g} className="flex items-center gap-2.5 py-1 cursor-pointer text-[15px] text-navy">
                  <span className={"w-5 h-5 rounded border flex items-center justify-center "+(goals.includes(g)?'bg-brand border-brand':'border-slate-300 bg-white')}>
                    {goals.includes(g)&&<Ic d={paths.check} cls="w-3 h-3 text-white"/>}
                  </span>
                  <input type="checkbox" className="hidden" checked={goals.includes(g)} onChange={()=>toggleGoal(g)}/>{g}
                </label>
              ))}
            </div>
          </div>
        </aside>

        {/* results */}
        <main className="flex-1 min-w-0">
          {banner && (
            <div className="rounded-2xl p-5 mb-5 flex items-center gap-4 relative overflow-hidden" style={{background:'linear-gradient(110deg,#0e122e,#312e81 60%,#2d5fd4)'}}>
              <div className="w-12 h-12 rounded-full shrink-0" style={{background:'radial-gradient(circle at 30% 30%,#c7d2fe,#6366f1,#312e81)'}}></div>
              <div className="flex-1">
                <div className="text-[11px] font-bold tracking-wider text-indigo-200">RECOMMENDED</div>
                <div className="text-white font-semibold">Answer a few questions, get up to 5 tailored quotes</div>
                <div className="text-indigo-200 text-sm">Matched to exactly what you need</div>
              </div>
              <button className="bg-white text-brand font-semibold px-4 py-2.5 rounded-xl text-sm">Get tailored quotes</button>
              <button onClick={()=>setBanner(false)} className="absolute top-3 right-3 text-white/70 hover:text-white"><Ic d={paths.x}/></button>
            </div>
          )}

          <div className="flex items-start justify-between mb-3">
            <div>
              <h2 className="text-xl font-bold text-navy">{results.length===TRAINERS.length? `${results.length} professionals matching your search` : `${results.length} of ${TRAINERS.length} match your filters`}</h2>
              <p className="text-slate text-sm">Top matches are selected by AI based on your request and their expertise</p>
            </div>
            <div className="text-sm text-navy border border-slate-200 rounded-lg px-3 py-2 bg-white shrink-0">Sort by: Best match ▾</div>
          </div>

          {chips.length>0 && (
            <div className="flex flex-wrap items-center gap-2 mb-4">
              {chips.map(c=>(
                <button key={c.id} onClick={c.clr} className="flex items-center gap-1.5 pl-3 pr-2 py-1.5 rounded-full bg-brand/10 border border-brand text-brand text-[13px] font-medium">
                  {c.l}<Ic d={paths.x} cls="w-3 h-3"/>
                </button>
              ))}
              <button onClick={clearAll} className="text-slate text-[13px] font-medium ml-1">Clear all</button>
            </div>
          )}

          {results.length===0 ? (
            <div className="bg-white rounded-2xl border border-slate-100 p-10 text-center">
              <div className="text-lg font-semibold text-navy mb-1">No exact matches for your filters</div>
              <p className="text-slate text-sm mb-4">Try loosening a filter to see more professionals.</p>
              <button onClick={clearAll} className="bg-brand text-white font-medium px-5 py-2.5 rounded-xl">Clear filters</button>
            </div>
          ) : (
            <div className="space-y-4">{results.map(t=><Card key={t.id} t={t} expanded={!!expanded[t.id]} onExpand={()=>setExpanded(e=>({...e,[t.id]:!e[t.id]}))} seeMore={!!seeMore[t.id]} onSee={()=>setSeeMore(s=>({...s,[t.id]:!s[t.id]}))}/>)}</div>
          )}
        </main>
      </div>
    </div>
  );
}

function Card({t,expanded,onExpand,seeMore,onSee}){
  return (
    <div className="bg-white rounded-2xl border border-slate-100 p-5 flex gap-5">
      {/* left col */}
      <div className="w-[132px] shrink-0 flex flex-col items-center text-center">
        <div className="w-[104px] h-[104px] rounded-xl flex items-center justify-center text-white text-2xl font-bold" style={{background:t.color}}>{t.initials}</div>
        <button className="text-brand text-sm font-medium mt-3">View profile</button>
        <button className="text-brand text-sm font-medium mt-3 flex items-center gap-1.5"><Ic d={paths.msg} cls="w-4 h-4"/>Send message</button>
        <button className="mt-2.5 w-full bg-brand/10 text-brand text-sm font-medium rounded-lg py-2 flex items-center justify-center gap-1.5"><Ic d={paths.dollar} cls="w-3.5 h-3.5"/>Request quote</button>
      </div>
      {/* right col */}
      <div className="flex-1 min-w-0">
        <div className="flex items-start justify-between gap-3">
          <div>
            <div className="flex items-center gap-1.5">
              <span className="font-bold text-navy text-[17px]">{t.name}</span>
              {t.verified&&<span className="w-4 h-4 rounded-full bg-brand flex items-center justify-center"><Ic d={paths.check} cls="w-2.5 h-2.5 text-white"/></span>}
            </div>
            <div className="flex items-center gap-2 mt-1 flex-wrap">
              {t.state==='reviewed' ? (
                <span className="flex items-center gap-1"><span className="flex">{[1,2,3,4,5].map(i=><Star key={i} filled={i<=Math.round(t.rating)}/>)}</span><span className="font-semibold text-navy text-sm">{t.rating.toFixed(1)}</span><span className="text-slate text-sm">({t.reviews})</span></span>
              ) : t.state==='new' ? (
                <span className="text-[12px] font-medium px-2.5 py-1 rounded-full bg-green-100 text-green-800">🚀 New on Bark</span>
              ) : (
                <span className="text-[12px] font-medium px-2.5 py-1 rounded-full bg-slate-100 text-dnavy flex items-center gap-1">☆ No reviews yet</span>
              )}
              {t.topMatch&&<span className="text-[12px] font-medium px-2.5 py-1 rounded-full bg-slate-100 text-dnavy">🔥 Top Match</span>}
            </div>
            <div className="flex items-center gap-1 text-slate text-sm mt-1"><Ic d={paths.pin} cls="w-4 h-4 text-brand"/>{t.location} · {t.distance} km</div>
          </div>
          <div className="text-right shrink-0"><span className="text-xl font-bold text-navy">{t.price.split('/')[0]}</span><span className="text-slate text-sm">/{t.price.split('/')[1]}</span></div>
        </div>

        <div className="flex flex-wrap gap-x-5 gap-y-1.5 mt-3 text-sm text-navy">
          {t.hires>0 && <span className="flex items-center gap-1.5"><Ic d={paths.users} cls="w-4 h-4 text-brand"/>{t.hires} hires on Bark</span>}
          <span className="flex items-center gap-1.5"><Ic d={paths.case} cls="w-4 h-4 text-brand"/>{t.years} years in business</span>
          <span className="flex items-center gap-1.5"><Ic d={paths.clock} cls="w-4 h-4 text-brand"/>{t.responseMins} min response time</span>
        </div>
        <div className="text-sm text-dnavy mt-2">{t.goals.slice(0,3).join(' · ')} <span className="text-slate">· +{t.goals.length} more</span></div>

        <p className="text-slate text-sm mt-3 leading-relaxed">
          {seeMore ? t.bio+' We tailor every block to your goals, review progress fortnightly, and keep it flexible around your schedule.' : t.bio+' '}
          <button onClick={onSee} className="text-brand underline font-medium">{seeMore?'See less':'See more'}</button>
        </p>

        {/* Why this match — improved */}
        <div className="mt-4 rounded-xl border border-violet-200 bg-lav overflow-hidden">
          <button onClick={onExpand} className="w-full flex items-center justify-between px-4 py-3">
            <span className="font-medium text-violet">Why this match</span>
            <span className="flex items-center gap-2 text-slate text-sm"><Ic d={paths.spark} cls="w-4 h-4 text-violet"/>AI Summary <Ic d={paths.chevron} cls={"w-4 h-4 transition "+(expanded?'rotate-180':'')}/></span>
          </button>
          {expanded && (
            <div className="px-4 pb-4">
              <div className="text-slate text-[13px] mb-2">Matched to what you asked for</div>
              <div className="space-y-1.5">
                {t.why.map((r,i)=>(
                  <div key={i} className="flex items-center gap-2.5 text-navy text-sm"><Ic d={paths.check} cls="w-4 h-4 text-violet"/>{r}</div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
